<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRADEX — Trading Journal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════ HEADER -->
  <header class="header">
    <div class="logo">TRADEX <span>// JOURNAL</span></div>
    <div class="header-time" id="headerTime"></div>
    <div class="header-actions">
      <button class="btn btn-outline btn-sm" onclick="exportCSV()">⬇ CSV</button>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════════ NAV -->
  <nav class="nav">
    <button class="nav-tab active" onclick="showSection('dashboard')">Dashboard</button>
    <button class="nav-tab" onclick="showSection('log')">Log Trade</button>
    <button class="nav-tab" onclick="showSection('analysis')">Analysis</button>
  </nav>

  <div class="main">

    <!-- ═══════════════════════════════════════════════════ DASHBOARD -->
    <div id="section-dashboard" class="section active">

      <!-- Stats Row -->
      <div class="stats-grid" id="statsGrid"></div>

      <!-- Trade Table Card -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Trade Log</div>
          <button class="btn btn-primary btn-sm" onclick="showSection('log')">+ New Trade</button>
        </div>

        <!-- Filters -->
        <div class="filters">
          <div class="form-group">
            <label>Instrument</label>
            <input type="text" id="filterInstrument" placeholder="e.g. EUR/USD" oninput="renderTrades()">
          </div>
          <div class="form-group">
            <label>Direction</label>
            <select id="filterDirection" onchange="renderTrades()">
              <option value="">All</option>
              <option value="Long">Long</option>
              <option value="Short">Short</option>
            </select>
          </div>
          <div class="form-group">
            <label>Date From</label>
            <input type="date" id="filterDateFrom" onchange="renderTrades()">
          </div>
          <div class="form-group">
            <label>Date To</label>
            <input type="date" id="filterDateTo" onchange="renderTrades()">
          </div>
          <div class="form-group">
            <label>Outcome</label>
            <select id="filterOutcome" onchange="renderTrades()">
              <option value="">All</option>
              <option value="win">Wins</option>
              <option value="loss">Losses</option>
            </select>
          </div>
          <button class="btn btn-outline btn-sm" onclick="resetFilters()" style="align-self:flex-end">Reset</button>
        </div>

        <!-- Table -->
        <div class="table-wrapper">
          <table id="tradesTable">
            <thead>
              <tr>
                <th onclick="sortTable('date')">Date</th>
                <th onclick="sortTable('instrument')">Instrument</th>
                <th>Dir</th>
                <th>Entry</th>
                <th>Exit</th>
                <th>Size</th>
                <th onclick="sortTable('pnl')">P&amp;L $</th>
                <th>P&amp;L %</th>
                <th>R:R</th>
                <th>Tags</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tradesBody"></tbody>
          </table>
          <div id="emptyState" class="empty-state" style="display:none">
            <div class="empty-icon">📊</div>
            <p>No trades found. Start logging your trades.</p>
          </div>
        </div>
      </div>
    </div><!-- /dashboard -->

    <!-- ═══════════════════════════════════════════════════ LOG TRADE -->
    <div id="section-log" class="section">
      <div class="card">
        <div class="card-header">
          <div class="card-title" id="formTitle">New Trade Entry</div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>Date *</label>
            <input type="date" id="tradeDate" required>
          </div>
          <div class="form-group">
            <label>Instrument *</label>
            <input type="text" id="tradeInstrument" placeholder="EUR/USD, AAPL…" required>
          </div>
          <div class="form-group">
            <label>Direction *</label>
            <div class="direction-toggle">
              <button class="dir-btn active-long" id="btnLong" onclick="setDirection('Long')">LONG</button>
              <button class="dir-btn" id="btnShort" onclick="setDirection('Short')">SHORT</button>
            </div>
            <input type="hidden" id="tradeDirection" value="Long">
          </div>
          <div class="form-group">
            <label>Entry Price *</label>
            <input type="number" id="tradeEntry" placeholder="0.00" step="any">
          </div>
          <div class="form-group">
            <label>Exit Price *</label>
            <input type="number" id="tradeExit" placeholder="0.00" step="any">
          </div>
          <div class="form-group">
            <label>Position Size *</label>
            <input type="number" id="tradeSize" placeholder="Shares/Lots" step="any">
          </div>
          <div class="form-group">
            <label>Stop Loss</label>
            <input type="number" id="tradeStopLoss" placeholder="0.00" step="any">
          </div>
          <div class="form-group">
            <label>Take Profit</label>
            <input type="number" id="tradeTakeProfit" placeholder="0.00" step="any">
          </div>
          <div class="form-group full">
            <label>Tags (comma-separated)</label>
            <input type="text" id="tradeTags" placeholder="breakout, pullback, news…">
          </div>
          <div class="form-group full">
            <label>Notes</label>
            <textarea id="tradeNotes" placeholder="Trade rationale, emotions, lessons learned…"></textarea>
          </div>
        </div>

        <!-- Live P&L Preview -->
        <div id="pnlPreview" class="pnl-preview" style="display:none">
          <div class="preview-label">LIVE PREVIEW</div>
          <div class="preview-values">
            <div><span class="preview-key">P&L $: </span><span id="prevPnl">—</span></div>
            <div><span class="preview-key">P&L %: </span><span id="prevPnlPct">—</span></div>
            <div><span class="preview-key">R:R: </span><span id="prevRR">—</span></div>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-outline" onclick="resetForm()">Clear</button>
          <button class="btn btn-primary" onclick="saveTrade()">Save Trade</button>
        </div>
      </div>
    </div><!-- /log -->

    <!-- ═══════════════════════════════════════════════════ ANALYSIS -->
    <div id="section-analysis" class="section">

      <div class="stats-grid" id="analysisStats"></div>

      <div class="charts-grid">
        <div class="card">
          <div class="card-header">
            <div class="card-title">Equity Curve</div>
          </div>
          <div class="chart-container">
            <canvas id="equityChart" height="200"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-title">Monthly P&L</div>
          </div>
          <div id="monthlyBars" class="monthly-bars"></div>
        </div>
      </div>

      <div class="analysis-bottom-grid">
        <div class="card">
          <div class="card-header"><div class="card-title">Performance Breakdown</div></div>
          <div id="perfBreakdown"></div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">Win/Loss Distribution</div></div>
          <canvas id="winLossChart" height="200"></canvas>
        </div>
      </div>

    </div><!-- /analysis -->

  </div><!-- /main -->

  <!-- ═══════════════════════════════════════════════════════ EDIT MODAL -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="card-title" style="margin-bottom:20px;">Edit Trade</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="editDate">
        </div>
        <div class="form-group">
          <label>Instrument</label>
          <input type="text" id="editInstrument">
        </div>
        <div class="form-group">
          <label>Direction</label>
          <div class="direction-toggle">
            <button class="dir-btn" id="editBtnLong" onclick="setEditDirection('Long')">LONG</button>
            <button class="dir-btn" id="editBtnShort" onclick="setEditDirection('Short')">SHORT</button>
          </div>
          <input type="hidden" id="editDirection">
        </div>
        <div class="form-group">
          <label>Entry Price</label>
          <input type="number" id="editEntry" step="any">
        </div>
        <div class="form-group">
          <label>Exit Price</label>
          <input type="number" id="editExit" step="any">
        </div>
        <div class="form-group">
          <label>Position Size</label>
          <input type="number" id="editSize" step="any">
        </div>
        <div class="form-group">
          <label>Stop Loss</label>
          <input type="number" id="editStopLoss" step="any">
        </div>
        <div class="form-group">
          <label>Take Profit</label>
          <input type="number" id="editTakeProfit" step="any">
        </div>
        <div class="form-group full">
          <label>Tags</label>
          <input type="text" id="editTags">
        </div>
        <div class="form-group full">
          <label>Notes</label>
          <textarea id="editNotes"></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="updateTrade()">Update Trade</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════ TOASTS -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
</body>
</html>
